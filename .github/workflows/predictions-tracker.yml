name: Update World Cup Predictions

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily — after the previous day's matches finish
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "predictions/**"
      - "scripts/update_predictions.js"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Score predictions & update README
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update_predictions.js

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md predictions/predictions.yml
          if git commit -m "chore: update World Cup predictions"; then
            git push
          else
            echo "No changes to commit."
          fi
