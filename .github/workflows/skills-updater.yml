name: Update Tech Stack Icons

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "config/skill-gifs.json"
      - "config/skills-baseline.json"
      - "scripts/update_skills.js"

permissions:
  contents: write

concurrency:
  group: profile-readme-automation
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh animated skill icons from repo languages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/update_skills.js

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git commit -m "chore: update tech stack icons"; then
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              sleep 5
            done
          else
            echo "No changes to commit."
          fi
