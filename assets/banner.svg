    <circle cx="420" cy="8" r="0.5" opacity="0.8"/>
    <circle cx="610" cy="42" r="0.5" opacity="0.5"/>
    <circle cx="690" cy="8" r="0.75" opacity="0.7"/>
    <circle cx="810" cy="48" r="0.5" opacity="0.45"/>
    <circle cx="260" cy="45" r="0.5" opacity="0.6"/>
    <circle cx="480" cy="38" r="0.5" opacity="0.5"/>
    <circle cx="540" cy="8" r="0.5" opacity="0.75"/>
    <circle cx="120" cy="72" r="0.5" opacity="0.35"/>
    <circle cx="880" cy="58" r="0.5" opacity="0.4"/>
    <circle cx="350" cy="22" r="0.5" opacity="0.7"/>
    <circle cx="760" cy="35" r="0.5" opacity="0.55"/>
  </g>

  <!-- Milky way overlay -->
  <rect width="920" height="150" fill="url(#milkyWay)" opacity="1"/>

  <!-- Horizon glow above aqueduct -->
  <rect x="0" y="98" width="920" height="40" fill="url(#horizonGlow)"/>

