<svg width="100%" height="150" viewBox="0 0 920 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AdrianShah README header">
  <defs>
    <!-- Night sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="35%" stop-color="#0a1628"/>
      <stop offset="70%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>

    <!-- Milky way band -->
    <linearGradient id="milkyWay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stop-color="#788cc8" stop-opacity="0"/>
      <stop offset="42%" stop-color="#788cc8" stop-opacity="0.08"/>
      <stop offset="48%" stop-color="#b4bee6" stop-opacity="0.14"/>
      <stop offset="54%" stop-color="#788cc8" stop-opacity="0.08"/>
      <stop offset="66%" stop-color="#788cc8" stop-opacity="0"/>
    </linearGradient>

    <!-- Horizon glow -->
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb450" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffb450" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff8c32" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="archStone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3528"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>

    <radialGradient id="uplight" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>

    <filter id="archGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="crescentMask">
      <rect width="920" height="150" fill="black"/>
      <circle cx="852" cy="22" r="7" fill="white"/>
      <circle cx="856" cy="20" r="6" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="920" height="150" fill="url(#sky)"/>

  <!-- Star field -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="92" cy="22" r="0.5" opacity="0.9"/>
    <circle cx="230" cy="12" r="0.5" opacity="0.7"/>
    <circle cx="368" cy="33" r="0.75" opacity="0.85"/>
    <circle cx="506" cy="18" r="0.5" opacity="0.6"/>
