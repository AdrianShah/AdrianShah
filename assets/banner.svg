      <path d="M 14 88 L 14 54 A 20 20 0 0 1 54 54 L 54 88"/>
      <path d="M 60 88 L 60 54 A 20 20 0 0 1 100 54 L 100 88"/>
      <path d="M 106 88 L 106 54 A 20 20 0 0 1 146 54 L 146 88"/>
      <path d="M 152 88 L 152 54 A 20 20 0 0 1 192 54 L 192 88"/>
