      <ellipse cx="736" cy="78" rx="18" ry="8" fill="url(#uplight)"/>
      <ellipse cx="782" cy="78" rx="18" ry="8" fill="url(#uplight)"/>
      <ellipse cx="828" cy="78" rx="18" ry="8" fill="url(#uplight)"/>
      <ellipse cx="874" cy="78" rx="18" ry="8" fill="url(#uplight)"/>
    </g>

