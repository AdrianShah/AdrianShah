<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banner preview · Adrian Shahnazari Darcheh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1.25rem;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
    }

    .page > h1 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .page > p.note {
      font-size: 0.8125rem;
      color: #8b949e;
      margin-bottom: 1.25rem;
      line-height: 1.55;
    }

    .readme-frame {
      border: 1px solid #30363d;
      border-radius: 6px;
      overflow: hidden;
    }

    /* ── Banner ── */
    .banner {
      position: relative;
      min-height: 220px;
      overflow: hidden;
      background: linear-gradient(180deg, #020617 0%, #0a1628 35%, #0f1f3d 70%, #141820 100%);
    }

    /* Star field */
    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 25% 8%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 40% 22%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.75), transparent),
        radial-gradient(1.5px 1.5px at 85% 10%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 92% 28%, rgba(255,255,255,0.65), transparent),
        radial-gradient(1px 1px at 33% 42%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 62% 38%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 78% 45%, rgba(255,255,255,0.4), transparent);
      opacity: 0.85;
    }

    /* Milky way band */
    .milky-way {
      position: absolute;
      inset: -20% -10%;
      background: linear-gradient(
        125deg,
        transparent 30%,
        rgba(120, 140, 200, 0.08) 42%,
        rgba(180, 190, 230, 0.14) 48%,
        rgba(120, 140, 200, 0.08) 54%,
        transparent 66%
      );
      pointer-events: none;
    }

    /* Distant city glow through arches */
    .horizon-glow {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 52px;
      height: 40px;
      background: linear-gradient(
        180deg,
        transparent,
        rgba(255, 180, 80, 0.06) 40%,
        rgba(255, 140, 50, 0.12) 100%
      );
      pointer-events: none;
    }

    /* Kamares aqueduct SVG layer */
    .aqueduct-layer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      line-height: 0;
      pointer-events: none;
    }

    .aqueduct-layer svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Foreground content */
    .banner-content {
      position: relative;
      z-index: 2;
      padding: 1.1rem 1.35rem 4.5rem;
    }

    .filepath {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 0.65rem;
    }

    .name-block {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.02em;
      margin-bottom: 1.1rem;
      line-height: 1.2;
    }

    .name-block .prompt {
      color: #79c0ff;
      margin-right: 0.35rem;
    }

    .divider {
      height: 1px;
      background: #30363d;
      margin-bottom: 0.85rem;
      max-width: 100%;
    }

    /* Shield-style link badges (inspired by reference layout) */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: stretch;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 3px;
      overflow: hidden;
      line-height: 1;
      transition: opacity 0.15s;
    }

    .badge:hover { opacity: 0.88; }

    .badge .label {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.32rem 0.5rem;
      background: #555;
      color: #fff;
    }

    .badge .value {
      display: inline-flex;
      align-items: center;
      padding: 0.32rem 0.55rem;
      color: #fff;
      font-weight: 500;
    }

    .badge-website .value { background: #0aa; color: #fff; }
    .badge-linkedin .value { background: #0077b5; }
    .badge-gmail .value { background: #ea4335; font-size: 0.7rem; }

    .badge svg.icon {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .toggle-row {
      display: flex;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }

    button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
    }

    button.active { border-color: #58a6ff; color: #58a6ff; }

    .readme-frame.light .banner {
      background: linear-gradient(180deg, #dbeafe 0%, #93c5fd 40%, #64748b 100%);
    }

    .readme-frame.light .filepath { color: #57606a; }
    .readme-frame.light .name-block { color: #0969da; }
    .readme-frame.light .divider { background: #d0d7de; }
  </style>
</head>

  <script>
    const frame = document.getElementById("frame");
    document.getElementById("btn-dark").addEventListener("click", () => {
      frame.classList.remove("light");
      document.getElementById("btn-dark").classList.add("active");
      document.getElementById("btn-light").classList.remove("active");
    });
    document.getElementById("btn-light").addEventListener("click", () => {
      frame.classList.add("light");
      document.getElementById("btn-light").classList.add("active");
      document.getElementById("btn-dark").classList.remove("active");
    });
  </script>
